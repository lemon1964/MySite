  #     - .:/code
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=mysite.settings.prod
  #   depends_on:
  #     # - db
  #     - cache

  nginx:
    image: nginx:1.23.1
    restart: always
    volumes:
      - ./config/nginx:/etc/nginx/templates
      - .:/code
      - ./static:/code/mysite/static/
    ports:
      - "80:80"
      - "443:443"
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge
