services:

  # cache:
  #   image: redis:7.0.4
  #   restart: always
  #   volumes:
  #     - ./data/cache:/data

  db:
    image: postgres:16.2
    restart: always
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    networks:
    - mynetwork

  # rabbitmq:
  #   image: rabbitmq:management
  #   restart: always
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     - RABBITMQ_DEFAULT_USER=guest
  #     - RABBITMQ_DEFAULT_PASS=guest

  # celery_worker:
  #   build: .
  #   command: bash -c "cd ./mysite && celery -A mysite worker -l info"
  #   restart: always
  #   environment:
  #     - DJANGO_SETTINGS_MODULE=mysite.settings.prod
  #     - CELERY_BROKER_URL=${CELERY_BROKER_URL}
  #   volumes:
  #     - .:/code
  #   depends_on:
  #     - rabbitmq
  #     - db

  # flower:
  #   image: mher/flower
  #   restart: always
  #   ports:
  #     - "5555:5555"
  #   environment:
  #     - CELERY_BROKER_URL=${CELERY_BROKER_URL}

  web:
    build: .
    command: ["./wait-for-it.sh", "db:5432", "--", "uwsgi", "--ini", "/code/config/uwsgi/uwsgi.ini"]
    restart: always
    volumes:
      - .:/code
    environment:
      - DB_HOST=db
      - DJANGO_SETTINGS_MODULE=mysite.settings.prod
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_API_VERSION=${STRIPE_API_VERSION}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_DB=${REDIS_DB}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - SOCIAL_AUTH_GOOGLE_OAUTH2_KEY=${SOCIAL_AUTH_GOOGLE_OAUTH2_KEY}
      - SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET=${SOCIAL_AUTH_GOOGLE_OAUTH2_SECRET}
    depends_on:
      - db
      - cache
      - rabbitmq
    ports:
      - "8000:8000"
    networks:
      - mynetwork 

  # daphne:
  #   build: .
  #   working_dir: /code/mysite/
  #   command: ["../wait-for-it.sh", "db:5432", "--", "daphne", "-u", "/code/mysite/tmf/daphne.sock", "mysite.asgi:application"]
  #   restart: always
